<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chart QA — Hỏi đáp biểu đồ</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --success: #22d3ee;
    --error: #f87171;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  header p { color: var(--muted); font-size: 0.95rem; }

  .pipeline-badges {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.78rem;
    color: var(--accent2);
    font-weight: 500;
  }

  .badge .arrow { color: var(--muted); margin: 0 6px; }

  main {
    width: 100%;
    max-width: 820px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  .card h2 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 16px;
  }

  /* Drop zone */
  #dropzone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
    overflow: hidden;
  }

  #dropzone:hover, #dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(108, 99, 255, .06);
  }

  #dropzone .drop-icon {
    font-size: 2.4rem;
    margin-bottom: 10px;
  }

  #dropzone p { color: var(--muted); font-size: 0.9rem; }
  #dropzone span { color: var(--accent2); text-decoration: underline; cursor: pointer; }

  #fileInput { display: none; }

  #preview-wrap {
    display: none;
    position: relative;
  }

  #preview-wrap img {
    width: 100%;
    max-height: 340px;
    object-fit: contain;
    border-radius: 8px;
    background: #000;
  }

  #remove-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(0,0,0,.6);
    border: none;
    color: #fff;
    border-radius: 50%;
    width: 28px; height: 28px;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* Question input */
  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.97rem;
    padding: 12px 14px;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color .2s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  /* Submit btn */
  #submit-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }

  #submit-btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
  #submit-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* Loading */
  .loading-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    display: none;
    animation: shimmer 1.2s infinite;
  }

  @keyframes shimmer {
    0% { opacity: 1; } 50% { opacity: .4; } 100% { opacity: 1; }
  }

  /* Result */
  #result-card { display: none; }

  .result-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .meta-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 0.82rem;
  }

  .meta-chip label { color: var(--muted); margin-right: 4px; }
  .meta-chip span { color: var(--accent2); font-weight: 600; }

  .answer-box {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 16px 18px;
    font-size: 1rem;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  details {
    margin-top: 14px;
  }

  summary {
    color: var(--muted);
    font-size: 0.85rem;
    cursor: pointer;
    user-select: none;
    margin-bottom: 8px;
  }

  .extracted-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 0.83rem;
    font-family: 'Courier New', monospace;
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
    color: var(--muted);
  }

  .error-box {
    background: rgba(248, 113, 113, .08);
    border: 1px solid var(--error);
    border-radius: 8px;
    padding: 14px;
    color: var(--error);
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<header>
  <h1>📊 Chart QA</h1>
  <p>Hỏi đáp thông minh về biểu đồ bằng AI</p>
  <div class="pipeline-badges">
    <span class="badge">🔍 YOLO</span>
    <span class="badge"><span class="arrow">→</span> PaddleOCR-VL</span>
    <span class="badge"><span class="arrow">→</span> Vintern</span>
  </div>
</header>

<main>

  <!-- Upload card -->
  <div class="card">
    <h2>1. Chọn ảnh biểu đồ</h2>
    <div id="dropzone">
      <div class="drop-icon">🖼️</div>
      <p>Kéo thả ảnh vào đây hoặc <span id="browse-link">chọn file</span></p>
      <p style="font-size:0.78rem;margin-top:6px">PNG, JPG, WEBP — tối đa 10MB</p>
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" />
    </div>
    <div id="preview-wrap">
      <img id="preview-img" src="" alt="preview" />
      <button id="remove-btn" title="Xóa ảnh">✕</button>
    </div>
  </div>

  <!-- Question card -->
  <div class="card">
    <h2>2. Nhập câu hỏi</h2>
    <textarea id="question" placeholder="VD: Công ty nào có doanh thu cao nhất năm 2023? / Which category has the highest value?"></textarea>
  </div>

  <!-- Submit -->
  <button id="submit-btn" disabled>🚀 Phân tích & Trả lời</button>
  <div class="loading-bar" id="loading-bar"></div>

  <!-- Result -->
  <div class="card" id="result-card">
    <h2>3. Kết quả</h2>
    <div id="result-content"></div>
  </div>

</main>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const browseLink = document.getElementById('browse-link');
const previewWrap = document.getElementById('preview-wrap');
const previewImg = document.getElementById('preview-img');
const removeBtn = document.getElementById('remove-btn');
const questionEl = document.getElementById('question');
const submitBtn = document.getElementById('submit-btn');
const loadingBar = document.getElementById('loading-bar');
const resultCard = document.getElementById('result-card');
const resultContent = document.getElementById('result-content');

let selectedFile = null;

function updateSubmitState() {
  submitBtn.disabled = !(selectedFile && questionEl.value.trim());
}

function showPreview(file) {
  selectedFile = file;
  const url = URL.createObjectURL(file);
  previewImg.src = url;
  dropzone.style.display = 'none';
  previewWrap.style.display = 'block';
  updateSubmitState();
}

browseLink.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) showPreview(e.target.files[0]); });

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) showPreview(file);
});

removeBtn.addEventListener('click', () => {
  selectedFile = null;
  fileInput.value = '';
  previewImg.src = '';
  previewWrap.style.display = 'none';
  dropzone.style.display = 'flex';
  updateSubmitState();
});

questionEl.addEventListener('input', updateSubmitState);

submitBtn.addEventListener('click', async () => {
  if (!selectedFile || !questionEl.value.trim()) return;

  submitBtn.disabled = true;
  loadingBar.style.display = 'block';
  resultCard.style.display = 'none';

  const formData = new FormData();
  formData.append('image', selectedFile);
  formData.append('question', questionEl.value.trim());

  try {
    const res = await fetch('/api/ask', { method: 'POST', body: formData });
    const data = await res.json();

    if (!res.ok) {
      resultContent.innerHTML = `<div class="error-box">❌ ${data.detail || 'Đã có lỗi xảy ra.'}</div>`;
    } else {
      const latency = data.latency || {};
      resultContent.innerHTML = `
        <div class="result-meta">
          <div class="meta-chip"><label>Loại biểu đồ:</label><span>${data.chart_type}</span></div>
          <div class="meta-chip"><label>Classify:</label><span>${latency.classify ?? '?'}s</span></div>
          <div class="meta-chip"><label>Extract:</label><span>${latency.extract ?? '?'}s</span></div>
          <div class="meta-chip"><label>QA:</label><span>${latency.qa ?? '?'}s</span></div>
          <div class="meta-chip"><label>Total:</label><span>${latency.total ?? '?'}s</span></div>
        </div>
        <div class="answer-box">${escapeHtml(data.answer)}</div>
        ${data.extracted_data ? `
        <details>
          <summary>📋 Xem dữ liệu trích xuất từ PaddleOCR-VL</summary>
          <div class="extracted-box">${escapeHtml(data.extracted_data)}</div>
        </details>` : ''}
      `;
    }
    resultCard.style.display = 'block';
  } catch (err) {
    resultContent.innerHTML = `<div class="error-box">❌ Lỗi kết nối: ${err.message}</div>`;
    resultCard.style.display = 'block';
  } finally {
    submitBtn.disabled = false;
    loadingBar.style.display = 'none';
    updateSubmitState();
  }
});

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
